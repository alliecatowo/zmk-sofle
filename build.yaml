---
# ZMK Build Configuration for AllieCatKeeb
include:
  # Standard build with no dongle
  - board: alliecat_keeb_left
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_BT_DEVICE_NAME='"AllieCatKeebL"'
    artifact-name: alliecat_keeb_standard_left
  - board: alliecat_keeb_right
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_BT_DEVICE_NAME='"AllieCatKeebR"'
    artifact-name: alliecat_keeb_standard_right

  # Dongle mode with nice_view
  - board: alliecat_keeb_left
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME='"AllieCatKeeb"' -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2 -DCONFIG_BT_MAX_CONN=7 -DCONFIG_BT_MAX_PAIRED=7
    artifact-name: alliecatkeeb_dongle_central

  # Peripheral halves for dongle mode (temporarily using just dongle_display until we create alliecat_keeb_peripheral)
  - board: alliecat_keeb_left
    shield: dongle_display
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: alliecatkeeb_dongle_peripheral_left

  # Right half peripheral for dongle mode
  - board: alliecat_keeb_right
    shield: dongle_display
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: alliecatkeeb_dongle_peripheral_right

  # Settings reset
  - board: alliecat_keeb_left
    shield: settings_reset
