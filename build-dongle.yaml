---
# Dongle Mode Build Configuration (3 Firmware Files)
include:
  # Dongle central device with display
  - board: nice_nano_v2
    shield: dongle_display
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME="\"AllieCatKeeb\"" -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2 -DCONFIG_BT_MAX_CONN=7 -DCONFIG_BT_MAX_PAIRED=7 -DCONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y -DCONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=y
    artifact-name: alliecatkeeb_dongle_central

  # Left half peripheral for dongle mode
  - board: alliecat_keeb_left
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_BT_DEVICE_NAME="\"AllieCatKeebL\""
    artifact-name: alliecatkeeb_left_peripheral

  # Right half peripheral for dongle mode
  - board: alliecat_keeb_right
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_BT_DEVICE_NAME="\"AllieCatKeebR\""
    artifact-name: alliecatkeeb_right_peripheral

  # Dongle peripheral
  - board: alliecat_keeb_dongle
    shield:
      - dongle_display
